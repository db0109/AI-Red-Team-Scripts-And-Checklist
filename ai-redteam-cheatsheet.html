<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Red Team Cheat Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #111118;
  --bg-card: #16161f;
  --bg-card-hover: #1c1c28;
  --bg-code: #0d0d14;
  --border: #2a2a3a;
  --border-active: #ff3e3e;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --text-muted: #555570;
  --accent-red: #ff3e3e;
  --accent-red-dim: #ff3e3e33;
  --accent-orange: #ff8c42;
  --accent-orange-dim: #ff8c4233;
  --accent-yellow: #ffd166;
  --accent-yellow-dim: #ffd16633;
  --accent-green: #06d6a0;
  --accent-green-dim: #06d6a033;
  --accent-blue: #4ea8de;
  --accent-blue-dim: #4ea8de33;
  --accent-purple: #b07aff;
  --accent-purple-dim: #b07aff33;
  --accent-pink: #ff6b9d;
  --accent-pink-dim: #ff6b9d33;
  --accent-cyan: #00e5ff;
  --accent-cyan-dim: #00e5ff33;
  --font-body: 'DM Sans', sans-serif;
  --font-heading: 'Outfit', sans-serif;
  --font-mono: 'Fira Code', 'JetBrains Mono', monospace;
  --radius: 8px;
  --radius-lg: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  padding: 16px 32px;
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  font-family: var(--font-mono);
}

.logo-text {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.logo-text span { color: var(--accent-red); }

.header-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-bar-container {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-secondary);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.progress-bar {
  width: 120px;
  height: 6px;
  background: var(--bg-primary);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-text {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 42px;
  text-align: right;
}

.btn-reset {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 14px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--accent-red); color: var(--accent-red); }

.btn-export {
  background: var(--accent-red);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-export:hover { background: #e63535; transform: translateY(-1px); }

/* Layout */
.layout {
  display: flex;
  max-width: 1400px;
  margin: 0 auto;
  min-height: calc(100vh - 65px);
}

/* Sidebar Nav */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 65px;
  height: calc(100vh - 65px);
  overflow-y: auto;
}

.nav-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 12px 20px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  font-size: 13px;
  color: var(--text-secondary);
}

.nav-item:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border-left-color: var(--accent-red);
}

.nav-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.nav-progress {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-left: auto;
}

/* Main Content */
.main {
  flex: 1;
  padding: 24px 32px;
  overflow-y: auto;
}

/* Section */
.section {
  margin-bottom: 32px;
  display: none;
}

.section.active { display: block; }

.section-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.section-title {
  font-family: var(--font-heading);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.section-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.owasp-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.owasp-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid;
  letter-spacing: 0.3px;
}

/* Checklist Groups */
.check-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.check-group:hover { border-color: #3a3a4a; }

.check-group-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.check-group-header:hover { background: var(--bg-card-hover); }

.check-group-arrow {
  font-size: 12px;
  color: var(--text-muted);
  transition: transform 0.2s;
  width: 16px;
  text-align: center;
}

.check-group.open .check-group-arrow { transform: rotate(90deg); }

.check-group-title {
  font-weight: 600;
  font-size: 14px;
  flex: 1;
}

.check-group-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-primary);
  padding: 2px 8px;
  border-radius: 10px;
}

.check-group-body {
  display: none;
  padding: 0 16px 14px;
  border-top: 1px solid var(--border);
}

.check-group.open .check-group-body { display: block; }

/* Check Items */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #1e1e2a;
}

.check-item:last-child { border-bottom: none; }

.check-item input[type="checkbox"] {
  appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.15s;
  position: relative;
}

.check-item input[type="checkbox"]:checked {
  background: var(--accent-green);
  border-color: var(--accent-green);
}

.check-item input[type="checkbox"]:checked::after {
  content: '✓';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #000;
  font-size: 12px;
  font-weight: 700;
}

.check-item.checked .check-label { color: var(--text-muted); text-decoration: line-through; }

.check-label {
  flex: 1;
  font-size: 13px;
  line-height: 1.5;
}

.check-label code {
  font-family: var(--font-mono);
  font-size: 11.5px;
  background: var(--bg-code);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--accent-cyan);
  word-break: break-all;
}

.check-label .tool-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 4px;
  vertical-align: middle;
  font-weight: 600;
}

.tool-garak { background: var(--accent-green-dim); color: var(--accent-green); border: 1px solid var(--accent-green); }
.tool-pyrit { background: var(--accent-blue-dim); color: var(--accent-blue); border: 1px solid var(--accent-blue); }
.tool-promptfoo { background: var(--accent-purple-dim); color: var(--accent-purple); border: 1px solid var(--accent-purple); }
.tool-burp { background: var(--accent-orange-dim); color: var(--accent-orange); border: 1px solid var(--accent-orange); }
.tool-custom { background: var(--accent-yellow-dim); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
.tool-manual { background: var(--accent-pink-dim); color: var(--accent-pink); border: 1px solid var(--accent-pink); }
.tool-deepteam { background: var(--accent-cyan-dim); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); }

.check-note {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  padding-left: 4px;
  border-left: 2px solid var(--border);
  margin-left: 0;
  padding-top: 2px;
  padding-bottom: 2px;
  font-style: italic;
}

/* Code blocks */
.code-block {
  background: var(--bg-code);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  margin: 8px 0 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent-cyan);
  overflow-x: auto;
  position: relative;
  line-height: 1.7;
}

.code-block .comment { color: var(--text-muted); }
.code-block .cmd { color: var(--accent-orange); }

.copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }

/* Gap indicator */
.gap-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--accent-red-dim);
  color: var(--accent-red);
  border: 1px solid var(--accent-red);
  margin-left: 6px;
  vertical-align: middle;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* Responsive */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .layout { flex-direction: column; }
  .main { padding: 16px; }
  .header-inner { flex-wrap: wrap; }
  .section { display: block !important; }
}

/* Print */
@media print {
  .header, .sidebar { display: none; }
  .section { display: block !important; page-break-inside: avoid; }
  .check-group-body { display: block !important; }
  body { background: #fff; color: #000; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">

    </div>
    <div class="header-controls">
      <div class="progress-bar-container">
        <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
      <button class="btn-reset" onclick="resetAll()">Reset</button>
      <button class="btn-export" onclick="exportMarkdown()">Export .md</button>
    </div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

const STORAGE_KEY = 'ai-redteam-checklist-state';
let state = loadState();

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getCheckId(sectionId, groupIdx, itemIdx) {
  return `${sectionId}-${groupIdx}-${itemIdx}`;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<div class="nav-section-label">Phases</div>';
  DATA.forEach((sec, i) => {
    const total = sec.groups.reduce((a, g) => a + g.items.length, 0);
    let checked = 0;
    sec.groups.forEach((g, gi) => g.items.forEach((_, ii) => {
      if (state[getCheckId(sec.id, gi, ii)]) checked++;
    }));
    html += `<div class="nav-item ${i === 0 ? 'active' : ''}" data-section="${sec.id}" onclick="showSection('${sec.id}')">
      <div class="nav-dot" style="background:${sec.color}"></div>
      <span>${sec.title.split(' ').slice(0,2).join(' ')}</span>
      <span class="nav-progress">${checked}/${total}</span>
    </div>`;
  });
  sb.innerHTML = html;
}

function renderMain() {
  const main = document.getElementById('main');
  let html = '';
  DATA.forEach((sec, si) => {
    html += `<div class="section ${si === 0 ? 'active' : ''}" id="section-${sec.id}">`;
    html += `<div class="section-header">
      <div class="section-icon" style="background:${sec.color}22;color:${sec.color}">${sec.icon}</div>
      <div><div class="section-title">${sec.title}</div><div class="section-subtitle">${sec.subtitle}</div></div>
    </div>`;
    if (sec.owasp) {
      html += '<div class="owasp-tags">';
      sec.owasp.forEach(t => {
        html += `<span class="owasp-tag" style="color:${t.color};border-color:${t.color}44;background:${t.color}11">${t.label}</span>`;
      });
      html += '</div>';
    }
    sec.groups.forEach((g, gi) => {
      html += `<div class="check-group open">`;
      html += `<div class="check-group-header" onclick="toggleGroup(this)">
        <span class="check-group-arrow">▶</span>
        <span class="check-group-title">${g.title}${g.gap ? '<span class="gap-badge">GAP ADDED</span>' : ''}</span>
        <span class="check-group-count">${g.items.length}</span>
      </div>`;
      html += `<div class="check-group-body">`;
      g.items.forEach((item, ii) => {
        const cid = getCheckId(sec.id, gi, ii);
        const checked = state[cid] ? 'checked' : '';
        const toolClass = item.tool ? `tool-${item.tool}` : '';
        const toolLabel = item.tool ? ({
          manual: 'MANUAL', garak: 'GARAK', pyrit: 'PYRIT', promptfoo: 'PROMPTFOO',
          burp: 'BURP', custom: 'SCRIPT', deepteam: 'DEEPTEAM'
        })[item.tool] || item.tool.toUpperCase() : '';
        html += `<div class="check-item ${checked ? 'checked' : ''}">
          <input type="checkbox" ${checked} onchange="toggleCheck('${cid}', this)">
          <div class="check-label">
            ${item.text}
            ${toolLabel ? `<span class="tool-badge ${toolClass}">${toolLabel}</span>` : ''}
            ${item.note ? `<div class="check-note">${item.note}</div>` : ''}
          </div>
        </div>`;
      });
      html += '</div></div>';
    });
    html += '</div>';
  });
  main.innerHTML = html;
}

function toggleGroup(header) {
  header.parentElement.classList.toggle('open');
}

function toggleCheck(cid, el) {
  state[cid] = el.checked;
  el.closest('.check-item').classList.toggle('checked', el.checked);
  saveState();
  updateProgress();
  renderSidebar();
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + id)?.classList.add('active');
  document.querySelector(`.nav-item[data-section="${id}"]`)?.classList.add('active');
}

function updateProgress() {
  let total = 0, checked = 0;
  DATA.forEach(sec => sec.groups.forEach((g, gi) => g.items.forEach((_, ii) => {
    total++;
    if (state[getCheckId(sec.id, gi, ii)]) checked++;
  })));
  const pct = total ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${checked}/${total}`;
}

function resetAll() {
  if (confirm('Reset all checklist progress? This cannot be undone.')) {
    state = {};
    saveState();
    renderMain();
    renderSidebar();
    updateProgress();
  }
}

function exportMarkdown() {
  let md = '# AI Red Team Cheat Sheet — Assessment Report\n\n';
  md += `Generated: ${new Date().toISOString().split('T')[0]}\n\n`;
  DATA.forEach(sec => {
    md += `## ${sec.icon} ${sec.title}\n\n`;
    if (sec.owasp) {
      md += 'OWASP: ' + sec.owasp.map(t => t.label).join(' | ') + '\n\n';
    }
    sec.groups.forEach((g, gi) => {
      md += `### ${g.title}\n\n`;
      g.items.forEach((item, ii) => {
        const cid = getCheckId(sec.id, gi, ii);
        const mark = state[cid] ? 'x' : ' ';
        const text = item.text.replace(/<[^>]+>/g, '').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&#39;/g, "'");
        md += `- [${mark}] ${text}\n`;
        if (item.note) md += `  > ${item.note}\n`;
      });
      md += '\n';
    });
  });
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ai-redteam-checklist.md';
  a.click();
}

// Init
renderSidebar();
renderMain();
updateProgress();
</script>
</body>
</html>
